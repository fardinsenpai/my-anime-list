name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inject API keys
        run: |
          sed -i "s/GROQ_KEY_1/${{ secrets.GROQ_KEY_1 }}/g" script.js
          sed -i "s/GROQ_KEY_2/${{ secrets.GROQ_KEY_2 }}/g" script.js
          sed -i "s/GROQ_KEY_3/${{ secrets.GROQ_KEY_3 }}/g" script.js
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
